<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AltTap is a website made for practicing alternate spamming for games like Geometry Dash">

  <!-- Browser customization -->
  <meta name="theme-color" content="#18181B">
  <meta name="color-scheme" content="dark">

  <link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico" />
  <link rel="stylesheet" href="./styles/dist/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">

  <title>AltTap</title>
</head>
<body>
  <div class="container" role="main">
    <nav class="nav">
      <div class="mode" data-mode="time">
        <i class="ph ph-clock icon"></i>
        <hr>
        <nav class="subnav" role="navigation">
          <label data-tooltip="Spam for 5 seconds" data-pos="top" data-value="5s" aria-label="spam 5 seconds">
            <input type="radio" name="mode-option" checked>
            <span>5s</span>
          </label>
          <label data-tooltip="Spam for 10 seconds" data-pos="top" data-value="10s" aria-label="spam 10 seconds">
            <input type="radio" name="mode-option">
            <span>10s</span>
          </label>
          <label data-tooltip="Spam for 20 seconds" data-pos="top" data-value="20s" aria-label="spam 20 seconds">
            <input type="radio" name="mode-option">
            <span>20s</span>
          </label>
          <label data-tooltip="Spam for 30 seconds" data-pos="top" data-value="30s" aria-label="spam 30 seconds">
            <input type="radio" name="mode-option">
            <span>30s</span>
          </label>
          <label data-tooltip="Spam for 60 seconds" data-pos="top" data-value="60s" aria-label="spam 60 seconds">
            <input type="radio" name="mode-option">
            <span>60s</span>
          </label>
        </nav>
      </div>
      <div class="mode" data-mode="reps">
        <i class="ph ph-repeat icon"></i>
        <hr>
        <nav class="subnav" role="navigation">
          <label data-tooltip="Spam 25 times" data-pos="top" data-value="25x" aria-label="spam 25 times">
            <input type="radio" name="mode-option">
            <span>25x</span>
          </label>
          <label data-tooltip="Spam 50 times" data-pos="top" data-value="50x" aria-label="spam 50 times">
            <input type="radio" name="mode-option">
            <span>50x</span>
          </label>
          <label data-tooltip="Spam 100 times" data-pos="top" data-value="100x" aria-label="spam 100 times">
            <input type="radio" name="mode-option">
            <span>100x</span>
          </label>
          <label data-tooltip="Spam 250 times" data-pos="top" data-value="250x" aria-label="spam 250 times">
            <input type="radio" name="mode-option">
            <span>250x</span>
          </label>
          <label data-tooltip="Spam 500 times" data-pos="top" data-value="500x" aria-label="spam 500 times">
            <input type="radio" name="mode-option">
            <span>500x</span>
          </label>
        </nav>
      </div>
      <div class="mode" data-mode="infinite">
        <nav class="subnav" role="navigation">
          <label data-tooltip="Spam endless" data-pos="top" aria-label="spam for infinity">
            <input type="radio" name="mode-option">
            <i class="ph ph-infinity icon"></i>
          </label>
        </nav>
      </div>
    </nav>
    <header class="output-header" role="contentinfo">
      <span class="next-key"></span>
      <span class="counter"></span>
    </header>
    <div class="output-wrapper">
      <div class="output" role="group"></div>
    </div>
    <!-- <canvas class="wave-simulator" width="700" height="200"></canvas> -->
  </div>

  <p class="responsive-message">This website is not built for touchscreen devices, please switch to a laptop or pc.</p>

  <script src="./js/main.js"></script>
  <!-- <script src="./js/wave.js"></script> -->
</body>
</html>
